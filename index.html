<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrabblewhiz - Results</title>
    <style>
        /* Add your CSS styling here */
        #statistics-panel { margin-top: 20px; }
        .progress { width: 100%; height: 20px; background: lightgray; border: 1px solid #ccc; }
        .progress-bar { height: 100%; background: green; width: 0%; }
    </style>
</head>
<body>
    <div id="statistics-panel">
        <h2>Statistics</h2>
        <p>Unique Words Encountered: <span id="unique-words-encountered">0</span></p>
        <p>Unique Words Found: <span id="unique-words-found">0</span></p>
        <p>Total Unique Words: <span id="total-unique-words">0</span></p>
        <p>Database Size: <span id="database-size">0</span></p>
        <div class="progress"><div class="progress-bar" id="coverage-bar"></div></div>
        <p>Coverage: <span id="coverage-percentage">0%</span></p>
    </div>
    <script>
        let sessionUniqueWordsEncountered = 0;
        let sessionUniqueWordsFound = 0;
        let sessionTotalUniqueWords = 0;
        let sessionDatabaseSize = 0; // assign your database size here

        function endGame() {
            // Logic for ending the game
            updateStats();
        }

        function startGame() {
            // Logic for starting a new game
            sessionUniqueWordsEncountered = 0;
            sessionUniqueWordsFound = 0;
            // Reset/display other variables
        }

        function nextWord(word) {
            sessionUniqueWordsEncountered += 1; // Increment encountered count
            // Logic for checking if the word is found
            checkIfFound(word);
            updateStats();
        }

        function checkAnswer(isCorrect) {
            if (isCorrect) {
                sessionUniqueWordsFound += 1; // Increment found count
            }
            updateStats();
        }

        function resetApp() {
            startGame(); // Reset session stats
            // Reset additional app state
        }

        function updateStats() {
            let coveragePercent = (sessionUniqueWordsFound / sessionDatabaseSize) * 100 || 0;
            document.getElementById('unique-words-encountered').innerText = sessionUniqueWordsEncountered;
            document.getElementById('unique-words-found').innerText = sessionUniqueWordsFound;
            document.getElementById('total-unique-words').innerText = sessionTotalUniqueWords;
            document.getElementById('database-size').innerText = sessionDatabaseSize;
            document.getElementById('coverage-percentage').innerText = Math.round(coveragePercent) + '%';
            document.getElementById('coverage-bar').style.width = coveragePercent + '%';
        }
    </script>
</body>
</html>
